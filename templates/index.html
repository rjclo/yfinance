      function computePriceRatio(payloads) {
        let minClose = Number.POSITIVE_INFINITY;
        let maxClose = 0;
        payloads.forEach((p) => {
          p.points.forEach((pt) => {
            const c = Number(pt.close || 0);
            if (c > 0) {
              minClose = Math.min(minClose, c);
              maxClose = Math.max(maxClose, c);
            }
          });
        });
        if (!Number.isFinite(minClose) || minClose <= 0 || maxClose <= 0) return 1;
        return maxClose / minClose;
      }

      function pickResolvedScaleMode(payloads) {
        if (scaleMode !== "auto") return scaleMode;
        const ratio = computePriceRatio(payloads);
        if (payloads.length > 1 && ratio >= 8) {
          return "percent";
        }
        return "price";
      }

      function formatNumber(value) {
        return new Intl.NumberFormat("en-US", { maximumFractionDigits: 2 }).format(value);
      }

      function formatSignedNumber(value) {
        const n = Number(value);
        if (!Number.isFinite(n)) return "N/A";
        const sign = n >= 0 ? "+" : "";
        return `${sign}${formatNumber(n)}`;
      }

      function formatSignedPercent(value) {
        const n = Number(value);
        if (!Number.isFinite(n)) return "N/A";
        const sign = n >= 0 ? "+" : "";
        return `${sign}${n.toFixed(2)}%`;
      }

      function getEtSessionLabel(dtEt) {
        const mins = dtEt.hour * 60 + dtEt.minute;
        if (mins < (9 * 60 + 30)) return "pre";
        if (mins <= (16 * 60)) return "regular";
        return "after";
      }

      function buildOneDaySessionSummary(payload) {
        const points = Array.isArray(payload?.points) ? payload.points : [];
        if (!points.length) return "";

        const parsed = points
          .map((pt) => {
            const dt = luxon.DateTime.fromISO(String(pt?.t || ""), { zone: "utc" }).setZone("America/New_York");
            const close = Number(pt?.close);
            if (!dt.isValid || !Number.isFinite(close)) return null;
            return { dt, close };
          })
          .filter(Boolean);
        if (!parsed.length) return "";

        const regular = parsed.filter((x) => getEtSessionLabel(x.dt) === "regular");
        const regularBase = regular.length ? regular[0] : parsed[0];
        const latestPoint = parsed[parsed.length - 1];
        const latestTs = latestPoint.dt.toFormat("h:mm a");
        const dayDelta = latestPoint.close - regularBase.close;
        const dayPct = regularBase.close > 0 ? (dayDelta / regularBase.close) * 100 : Number.NaN;
        return `${payload.ticker} last ${formatNumber(latestPoint.close)} ${formatSignedNumber(dayDelta)} (${formatSignedPercent(dayPct)}) (${latestTs} ET)`;
      }

      function isMultiDayRange(rangeKey) {
        return rangeKey !== "1d";
      }

      function formatXAxisTick(value) {
        const dt = luxon.DateTime.fromMillis(Number(value));
        if (!dt.isValid) return "";

        if (!isMultiDayRange(activeRange)) {
          return dt.toFormat("h:mm a");
        }

        // For multi-day intraday views, include day + time so labels are not ambiguous.
        if (["1w", "1m", "3m"].includes(activeRange)) {
          return dt.toFormat("MMM d h a");
        }

        return dt.toFormat("MMM d");
      }

      function hexToRgba(hex, alpha) {
        const clean = (hex || "").replace("#", "");
        if (clean.length !== 6) return `rgba(2,132,199,${alpha})`;
        const r = parseInt(clean.slice(0, 2), 16);
        const g = parseInt(clean.slice(2, 4), 16);
        const b = parseInt(clean.slice(4, 6), 16);
        return `rgba(${r}, ${g}, ${b}, ${alpha})`;
      }

      let priceTooltipEl = null;
      let hoverSyncTs = null;

      const hoverSyncLinePlugin = {
        id: "hoverSyncLine",
        afterDraw(chart) {
          if (!Number.isFinite(hoverSyncTs)) return;
          const xScale = chart?.scales?.x;
          const area = chart?.chartArea;
          if (!xScale || !area) return;
          const x = xScale.getPixelForValue(hoverSyncTs);
          if (!Number.isFinite(x) || x < area.left || x > area.right) return;

          const { ctx } = chart;
          ctx.save();
          ctx.setLineDash([5, 4]);
          ctx.lineWidth = 1;
          ctx.strokeStyle = "rgba(71, 85, 105, 0.9)";
          ctx.beginPath();
          ctx.moveTo(x, area.top);
          ctx.lineTo(x, area.bottom);
          ctx.stroke();
          ctx.restore();
        },
      };

      const sessionBoundaryPlugin = {
        id: "sessionBoundaryLine",
        afterDraw(chart) {
          if (!chart || chart.canvas?.id !== "priceChart") return;
          if (activeRange !== "1d") return;

          const xScale = chart?.scales?.x;
          const area = chart?.chartArea;
          if (!xScale || !area) return;

          const minMs = Number(xScale.min);
          const maxMs = Number(xScale.max);
          if (!Number.isFinite(minMs) || !Number.isFinite(maxMs)) return;

          const tz = "America/New_York";
          let dayEt = luxon.DateTime.fromMillis(minMs, { zone: "utc" }).setZone(tz).startOf("day");
          const endEt = luxon.DateTime.fromMillis(maxMs, { zone: "utc" }).setZone(tz).endOf("day");
          const marks = [];

          while (dayEt <= endEt) {
            if (dayEt.weekday <= 5) {
              const openUtc = dayEt.set({ hour: 9, minute: 30, second: 0, millisecond: 0 }).toUTC().toMillis();
              const closeUtc = dayEt.set({ hour: 16, minute: 0, second: 0, millisecond: 0 }).toUTC().toMillis();
              if (openUtc >= minMs && openUtc <= maxMs) marks.push({ ts: openUtc, kind: "open" });
              if (closeUtc >= minMs && closeUtc <= maxMs) marks.push({ ts: closeUtc, kind: "close" });
            }
            dayEt = dayEt.plus({ days: 1 });
          }
          if (!marks.length) return;

          const { ctx } = chart;
          ctx.save();
          marks.forEach((m) => {
            const x = xScale.getPixelForValue(m.ts);
            if (!Number.isFinite(x) || x < area.left || x > area.right) return;
            ctx.beginPath();
            ctx.setLineDash(m.kind === "open" ? [4, 3] : [2, 4]);
            ctx.lineWidth = 1;
            ctx.strokeStyle = m.kind === "open" ? "rgba(22, 163, 74, 0.55)" : "rgba(220, 38, 38, 0.55)";
            ctx.moveTo(x, area.top);
            ctx.lineTo(x, area.bottom);
            ctx.stroke();
          });
          ctx.restore();
        },
      };
      const trendBandPlugin = {
        id: "trendBand",
        beforeDatasetsDraw(chart) {
          if (!chart || chart.canvas?.id !== "priceChart") return;
          const cfg = chart?.options?.plugins?.trendBand;
          const bands = Array.isArray(cfg?.bands) ? cfg.bands : [];
          if (!bands.length) return;
          const xScale = chart?.scales?.x;
          const area = chart?.chartArea;
          if (!xScale || !area) return;

          const colorMap = {
            bullish: "rgba(34, 197, 94, 0.18)",
            bearish: "rgba(239, 68, 68, 0.18)",
            reversal: "rgba(245, 158, 11, 0.22)",
            neutral: "rgba(100, 116, 139, 0.00)",
          };

          const { ctx } = chart;
          ctx.save();
          bands.forEach((b) => {
            const start = Number(b?.start);
            const end = Number(b?.end);
            const state = String(b?.state || "neutral");
            if (!Number.isFinite(start) || !Number.isFinite(end) || end <= start) return;
            const x1 = xScale.getPixelForValue(start);
            const x2 = xScale.getPixelForValue(end);
            if (!Number.isFinite(x1) || !Number.isFinite(x2)) return;
            const left = Math.max(area.left, Math.min(x1, x2));
            const right = Math.min(area.right, Math.max(x1, x2));
            if (right <= left) return;
            if (state === "neutral") return;
            ctx.fillStyle = colorMap[state] || colorMap.neutral;
            ctx.fillRect(left, area.top, right - left, area.bottom - area.top);
            ctx.fillRect(left, area.top, right - left, 10);
          });
          ctx.restore();
        },
      };
      if (typeof Chart !== "undefined" && Chart?.register) {
        Chart.register(hoverSyncLinePlugin);
        Chart.register(sessionBoundaryPlugin);
        Chart.register(trendBandPlugin);

        const x = pt.element?.x ?? tooltip.caretX ?? 0;

        const pad = 16;

        let left = docX + x - el.offsetWidth - pad;
        if (left < minLeft) {
          left = docX + x + pad;
        }
        left = Math.max(minLeft, Math.min(maxLeft, left));

        const minTop = window.pageYOffset + 8;
        const maxTop = window.pageYOffset + window.innerHeight - el.offsetHeight - 8;
        let top = docY + y - (el.offsetHeight / 2);
        top = Math.max(minTop, Math.min(maxTop, top));

        el.style.left = `${left}px`;

      function buildMovingAverageOverlay(pricePoints, maPoints, baseClose) {
        const src = Array.isArray(maPoints) ? maPoints : [];
        if (!src.length || !Array.isArray(pricePoints) || !pricePoints.length) return [];

        const daily = src
          .map((m) => {
            const ts = Date.parse(String(m?.t || ""));
            const v = Number(m?.v);
            if (!Number.isFinite(ts) || !Number.isFinite(v)) return null;
            return { ts, v };
          })
          .filter(Boolean)
          .sort((a, b) => a.ts - b.ts);
        if (!daily.length) return [];

        const out = [];
        let idx = -1;
        pricePoints.forEach((pt) => {
          const ts = Date.parse(String(pt?.t || ""));
          if (!Number.isFinite(ts)) return;
          while (idx + 1 < daily.length && daily[idx + 1].ts <= ts) {
            idx += 1;
          }
          if (idx < 0) return;
          const maVal = daily[idx].v;
          let yVal = maVal;
          if (resolvedScaleMode === "percent" && baseClose > 0) {
            yVal = ((maVal / baseClose) - 1) * 100;
          }
          out.push({ x: pt.t, y: yVal });
        });
        return out;
      }

      function buildMovingAverageAligned(pricePoints, maPoints) {
        const src = Array.isArray(maPoints) ? maPoints : [];
        if (!src.length || !Array.isArray(pricePoints) || !pricePoints.length) return [];
        const daily = src
          .map((m) => {
            const ts = Date.parse(String(m?.t || ""));
            const v = Number(m?.v);
            if (!Number.isFinite(ts) || !Number.isFinite(v)) return null;
            return { ts, v };
          })
          .filter(Boolean)
          .sort((a, b) => a.ts - b.ts);
        if (!daily.length) return [];

        const out = [];
        let idx = -1;
        pricePoints.forEach((pt) => {
          const ts = Date.parse(String(pt?.t || ""));
          if (!Number.isFinite(ts)) return;
          while (idx + 1 < daily.length && daily[idx + 1].ts <= ts) idx += 1;
          out.push({ x: pt.t, v: idx >= 0 ? daily[idx].v : null });
        });
        return out;
      }

      function buildRsiSeries(pricePoints, period = 14) {
        const points = Array.isArray(pricePoints) ? pricePoints : [];
        if (points.length <= period) return [];

        const closes = points.map((pt) => Number(pt?.close));
        if (closes.some((v) => !Number.isFinite(v))) return [];

        let gainSum = 0;
        let lossSum = 0;
        for (let i = 1; i <= period; i += 1) {
          const diff = closes[i] - closes[i - 1];
          gainSum += Math.max(diff, 0);
          lossSum += Math.max(-diff, 0);
        }
        let avgGain = gainSum / period;
        let avgLoss = lossSum / period;

        const calcRsi = () => {
          if (avgLoss === 0 && avgGain === 0) return 50;
          if (avgLoss === 0) return 100;
          const rs = avgGain / avgLoss;
          return 100 - (100 / (1 + rs));
        };

        const out = [{ x: points[period].t, y: calcRsi() }];
        for (let i = period + 1; i < closes.length; i += 1) {
          const diff = closes[i] - closes[i - 1];
          const gain = Math.max(diff, 0);
          const loss = Math.max(-diff, 0);
          avgGain = ((avgGain * (period - 1)) + gain) / period;
          avgLoss = ((avgLoss * (period - 1)) + loss) / period;
          out.push({ x: points[i].t, y: calcRsi() });
        }
        return out;
      }

      function normalizeRsiSeries(rsiSeries, targetSeries) {
        const src = Array.isArray(rsiSeries) ? rsiSeries : [];
        const target = Array.isArray(targetSeries) ? targetSeries : [];
        if (!src.length || !target.length) return [];

        const yVals = target.map((p) => Number(p?.y)).filter((v) => Number.isFinite(v));
        if (!yVals.length) return [];
        const minY = Math.min(...yVals);
        const maxY = Math.max(...yVals);
        const span = Math.max(maxY - minY, 1e-9);

        return src
          .map((pt) => {
            const rsi = Number(pt?.y);
            if (!Number.isFinite(rsi)) return null;
            return {
              x: pt.x,
              y: minY + (Math.max(0, Math.min(100, rsi)) / 100) * span,
            };
          })
          .filter(Boolean);
      }

      function buildMacdSeries(pricePoints, fastPeriod = 12, slowPeriod = 26, signalPeriod = 9) {
        const points = Array.isArray(pricePoints) ? pricePoints : [];
        if (points.length < slowPeriod + signalPeriod) return [];
        const closes = points.map((pt) => Number(pt?.close));
        if (closes.some((v) => !Number.isFinite(v))) return [];

        const ema = (vals, period) => {
          if (!Array.isArray(vals) || vals.length < period) return [];
          const out = new Array(vals.length).fill(null);
          const k = 2 / (period + 1);
          let seed = 0;
          for (let i = 0; i < period; i += 1) seed += vals[i];
          let prev = seed / period;
          out[period - 1] = prev;
          for (let i = period; i < vals.length; i += 1) {
            prev = (vals[i] * k) + (prev * (1 - k));
            out[i] = prev;
          }
          return out;
        };

        const fast = ema(closes, fastPeriod);
        const slow = ema(closes, slowPeriod);
        const macd = closes.map((_, idx) => {
          const f = fast[idx];
          const s = slow[idx];
          if (!Number.isFinite(f) || !Number.isFinite(s)) return null;
          return f - s;
        });

        const macdSeed = macd.map((v) => (Number.isFinite(v) ? v : null));
        const signal = new Array(macd.length).fill(null);
        const start = macdSeed.findIndex((v) => Number.isFinite(v));
        if (start < 0) return [];
        const macdCompact = macdSeed.slice(start).filter((v) => Number.isFinite(v));
        if (macdCompact.length < signalPeriod) return [];
        const signalCompact = ema(macdCompact, signalPeriod);
        let compactIdx = 0;
        for (let i = start; i < macdSeed.length; i += 1) {
          if (!Number.isFinite(macdSeed[i])) continue;
          signal[i] = signalCompact[compactIdx];
          compactIdx += 1;
        }

        return points
          .map((pt, idx) => {
            const macdVal = macd[idx];
            const signalVal = signal[idx];
            if (!Number.isFinite(macdVal) || !Number.isFinite(signalVal)) return null;
            return { x: pt.t, macd: macdVal, signal: signalVal, hist: macdVal - signalVal };
          })
          .filter(Boolean);
      }

      function normalizeIndicatorSeries(indicatorSeries, targetSeries, valueKey = "y") {
        const src = Array.isArray(indicatorSeries) ? indicatorSeries : [];
        const target = Array.isArray(targetSeries) ? targetSeries : [];
        if (!src.length || !target.length) return [];

        const yVals = target.map((p) => Number(p?.y)).filter((v) => Number.isFinite(v));
        if (!yVals.length) return [];
        const minY = Math.min(...yVals);
        const maxY = Math.max(...yVals);
        const spanY = Math.max(maxY - minY, 1e-9);

        const srcVals = src.map((p) => Number(p?.[valueKey])).filter((v) => Number.isFinite(v));
        if (!srcVals.length) return [];
        const minSrc = Math.min(...srcVals);
        const maxSrc = Math.max(...srcVals);
        const spanSrc = Math.max(maxSrc - minSrc, 1e-9);

        return src
          .map((pt) => {
            const v = Number(pt?.[valueKey]);
            if (!Number.isFinite(v)) return null;
            return { x: pt.x, y: minY + ((v - minSrc) / spanSrc) * spanY };
          })
          .filter(Boolean);
      }

      function buildBollingerSeries(series, windowSize = 20, numStd = 2) {
        if (!Array.isArray(series) || series.length < 2) {
          return { upper: [], lower: [] };
        }

        const effectiveWindow = Math.max(2, Math.min(windowSize, series.length));

        const upper = [];
        const lower = [];

        for (let i = effectiveWindow - 1; i < series.length; i += 1) {
          const slice = series.slice(i - effectiveWindow + 1, i + 1).map((p) => p.y);
          const mean = slice.reduce((acc, v) => acc + v, 0) / slice.length;
          const variance = slice.reduce((acc, v) => acc + (v - mean) ** 2, 0) / slice.length;
          const std = Math.sqrt(variance);

          upper.push({ x: series[i].x, y: mean + numStd * std });
          lower.push({ x: series[i].x, y: mean - numStd * std });
        }

        return { upper, lower };
      }

      function getTimestampToPointMap(points, valueKey = "y") {
        const map = new Map();
        (Array.isArray(points) ? points : []).forEach((pt) => {
          const x = String(pt?.x || "");
          const val = Number(pt?.[valueKey]);
          if (!x || !Number.isFinite(val)) return;
          map.set(x, val);
        });
        return map;
      }

      function detectConfluenceAlerts(payloads) {
        const alerts = [];
        (Array.isArray(payloads) ? payloads : []).forEach((p) => {
          const points = Array.isArray(p?.points) ? p.points : [];
          if (points.length < 40) return;

          const closeSeries = points.map((pt) => ({ x: pt.t, y: Number(pt.close) })).filter((pt) => Number.isFinite(pt.y));
          if (closeSeries.length < 30) return;

          const rsiSeries = buildRsiSeries(points, 14);
          const macdSeries = buildMacdSeries(points, 12, 26, 9);
          const bands = buildBollingerSeries(closeSeries, 20, 2);
          if (!rsiSeries.length || macdSeries.length < 3 || !bands.upper.length) return;

          const rsiMap = getTimestampToPointMap(rsiSeries);
          const upperMap = getTimestampToPointMap(bands.upper);
          const lowerMap = getTimestampToPointMap(bands.lower);

          const latest = points[points.length - 1];
          const latestTs = String(latest?.t || "");
          const latestClose = Number(latest?.close);
          const latestVol = Number(latest?.volume || 0);
          if (!latestTs || !Number.isFinite(latestClose)) return;

          const rsiNow = rsiMap.get(latestTs);
          const upperNow = upperMap.get(latestTs);
          const lowerNow = lowerMap.get(latestTs);
          const macdNow = macdSeries[macdSeries.length - 1];
          const macdPrev = macdSeries[macdSeries.length - 2];
          const macdPrev2 = macdSeries[macdSeries.length - 3];
          if (
            !Number.isFinite(rsiNow)
            || !Number.isFinite(upperNow)
            || !Number.isFinite(lowerNow)
            || !macdNow
            || !macdPrev
            || !macdPrev2
          ) return;

          const recentVol = points.slice(-20).map((x) => Number(x?.volume || 0)).filter((v) => Number.isFinite(v) && v > 0);
          const avgVol20 = recentVol.length ? (recentVol.reduce((a, b) => a + b, 0) / recentVol.length) : 0;

          const maDaily = p?.moving_averages || {};
          const ma50Raw = Array.isArray(maDaily.ma50) && maDaily.ma50.length ? Number(maDaily.ma50[maDaily.ma50.length - 1]?.v) : null;
          const ma200Raw = Array.isArray(maDaily.ma200) && maDaily.ma200.length ? Number(maDaily.ma200[maDaily.ma200.length - 1]?.v) : null;

          const nearUpper = latestClose >= (upperNow * 0.995);
          const nearLower = latestClose <= (lowerNow * 1.005);
          const histFalling = macdNow.hist < macdPrev.hist && macdPrev.hist < macdPrev2.hist;
          const histRising = macdNow.hist > macdPrev.hist && macdPrev.hist > macdPrev2.hist;
          const volumeFading = avgVol20 > 0 ? latestVol < (avgVol20 * 0.9) : false;
          const volumeRising = avgVol20 > 0 ? latestVol > (avgVol20 * 1.2) : false;

          if (rsiNow >= 65 && nearUpper && histFalling && volumeFading) {
            alerts.push({
              ticker: p.ticker,
              kind: "reversal_watch",
              text: `${p.ticker}: Reversal watch (RSI ${rsiNow.toFixed(1)}, near upper band, MACD momentum fading, volume cooling).`,
            });
          }

          const trendUp = (Number.isFinite(ma50Raw) && latestClose > ma50Raw) || (Number.isFinite(ma200Raw) && latestClose > ma200Raw);
          if (rsiNow >= 52 && rsiNow <= 68 && macdNow.macd > macdNow.signal && histRising && trendUp && volumeRising) {
            alerts.push({
              ticker: p.ticker,
              kind: "trend_up_watch",
              text: `${p.ticker}: Uptrend continuation watch (RSI rising, MACD bullish, above MA trend filter, volume confirming).`,
            });
          }

          const bandWidthPct = ((upperNow - lowerNow) / Math.max(Math.abs(latestClose), 1e-9)) * 100;
          if (bandWidthPct < 1.2 && rsiNow > 50 && macdNow.macd > macdNow.signal && volumeRising) {
            alerts.push({
              ticker: p.ticker,
              kind: "squeeze_breakout_watch",
              text: `${p.ticker}: Bollinger squeeze breakout watch (tight bands + RSI>50 + MACD bullish + volume pickup).`,
            });
          }

          if (rsiNow <= 35 && nearLower && macdNow.hist > macdPrev.hist && volumeRising) {
            alerts.push({
              ticker: p.ticker,
              kind: "bounce_watch",
              text: `${p.ticker}: Oversold bounce watch (RSI ${rsiNow.toFixed(1)}, near lower band, MACD histogram improving).`,
            });
          }
        });

        return alerts;
      }

      function buildTrendBands(payload) {
        const points = Array.isArray(payload?.points) ? payload.points : [];
        if (points.length < 40) return [];

        const closeSeries = points
          .map((pt) => ({ x: String(pt?.t || ""), y: Number(pt?.close) }))
          .filter((pt) => pt.x && Number.isFinite(pt.y));
        if (closeSeries.length < 30) return [];

        const rsiMap = getTimestampToPointMap(buildRsiSeries(points, 14));
        const macdSeries = buildMacdSeries(points, 12, 26, 9);
        const macdMap = new Map();
        for (let i = 0; i < macdSeries.length; i += 1) {
          const item = macdSeries[i];
          macdMap.set(String(item.x), { ...item, prevHist: i > 0 ? macdSeries[i - 1].hist : null });
        }
        const bb = buildBollingerSeries(closeSeries, 20, 2);
        const upperMap = getTimestampToPointMap(bb.upper);
        const lowerMap = getTimestampToPointMap(bb.lower);

        const ma50Aligned = buildMovingAverageAligned(points, payload?.moving_averages?.ma50);
        const ma200Aligned = buildMovingAverageAligned(points, payload?.moving_averages?.ma200);
        const ma50Map = new Map(ma50Aligned.map((x) => [String(x.x), Number(x.v)]));
        const ma200Map = new Map(ma200Aligned.map((x) => [String(x.x), Number(x.v)]));

        const states = [];
        points.forEach((pt, idx) => {
          const x = String(pt?.t || "");
          const close = Number(pt?.close);
          if (!x || !Number.isFinite(close)) return;
          const rsi = rsiMap.get(x);
          const macd = macdMap.get(x);
          const upper = upperMap.get(x);
          const lower = lowerMap.get(x);
          const ma50 = ma50Map.get(x);
          const ma200 = ma200Map.get(x);

          const recentVol = points
            .slice(Math.max(0, idx - 19), idx + 1)
            .map((p) => Number(p?.volume || 0))
            .filter((v) => Number.isFinite(v) && v > 0);
          const avgVol20 = recentVol.length ? (recentVol.reduce((a, b) => a + b, 0) / recentVol.length) : 0;
          const vol = Number(pt?.volume || 0);
          const volUp = avgVol20 > 0 ? vol >= (avgVol20 * 1.1) : false;
          const volDown = avgVol20 > 0 ? vol <= (avgVol20 * 0.9) : false;

          let state = "neutral";
          if (Number.isFinite(rsi) && macd && Number.isFinite(macd.macd) && Number.isFinite(macd.signal)) {
            const histRising = Number.isFinite(macd.prevHist) ? macd.hist > macd.prevHist : false;
            const histFalling = Number.isFinite(macd.prevHist) ? macd.hist < macd.prevHist : false;
            const above50 = Number.isFinite(ma50) ? close > ma50 : true;
            const above200 = Number.isFinite(ma200) ? close > ma200 : true;
            const below50 = Number.isFinite(ma50) ? close < ma50 : false;
            const below200 = Number.isFinite(ma200) ? close < ma200 : false;
            const nearUpper = Number.isFinite(upper) ? close >= upper * 0.995 : false;
            const nearLower = Number.isFinite(lower) ? close <= lower * 1.005 : false;

            const bullishCore = rsi >= 52 && rsi <= 67 && macd.macd > macd.signal && above50 && above200;
            const bearishCore = rsi >= 33 && rsi <= 48 && macd.macd < macd.signal && below50 && (below200 || !Number.isFinite(ma200));

            if (rsi >= 68 && nearUpper && histFalling && volDown) {
              state = "reversal";
            } else if (rsi <= 32 && nearLower && histRising && volUp) {
              state = "reversal";
            } else if (bullishCore && (histRising || volUp) && !nearUpper) {
              state = "bullish";
            } else if (bearishCore && (histFalling || volUp) && !nearLower) {
              state = "bearish";
            }
          }

          states.push({ x, state });
        });
        if (!states.length) return [];

        const order = { neutral: 0, bullish: 1, bearish: 2, reversal: 3 };
        const smoothWindow = 3;
        const smoothed = states.map((s, idx) => {
          const start = Math.max(0, idx - smoothWindow + 1);
          const slice = states.slice(start, idx + 1);
          const counts = { neutral: 0, bullish: 0, bearish: 0, reversal: 0 };
          slice.forEach((it) => { counts[it.state] = (counts[it.state] || 0) + 1; });
          let best = "neutral";
          let bestCount = -1;
          Object.keys(counts).forEach((k) => {
            const c = counts[k];
            if (c > bestCount || (c === bestCount && order[k] > order[best])) {
              best = k;
              bestCount = c;
            }
          });
          return { x: s.x, state: best };
        });

        const bands = [];
        let startMs = Date.parse(smoothed[0].x);
        let current = smoothed[0].state;
        let runLen = 1;
        for (let i = 1; i < smoothed.length; i += 1) {
          const ms = Date.parse(smoothed[i].x);
          if (!Number.isFinite(ms)) continue;
          if (smoothed[i].state !== current) {
            if (runLen >= 3) bands.push({ start: startMs, end: ms, state: current });
            startMs = ms;
            current = smoothed[i].state;
            runLen = 1;
          } else {
            runLen += 1;
          }
        }
        const lastMs = Date.parse(smoothed[smoothed.length - 1].x);
        if (Number.isFinite(startMs) && Number.isFinite(lastMs) && lastMs > startMs) {
          if (runLen >= 3) bands.push({ start: startMs, end: lastMs, state: current });
        }
        return bands.filter((b) => Number.isFinite(b.start) && Number.isFinite(b.end) && b.end > b.start);
      }

      function getTrendStateLabel(state) {
        const s = String(state || "neutral");
        if (s === "bullish") return "Bullish";
        if (s === "bearish") return "Bearish";
        if (s === "reversal") return "Reversal Watch";
        return "Neutral";
      }

      function renderConfluenceAlerts(payloads) {
        if (!confluenceAlertsEl) return;
        const alerts = detectConfluenceAlerts(payloads);
        const primary = Array.isArray(payloads) && payloads.length === 1 ? payloads[0] : null;
        const trendBands = primary ? buildTrendBands(primary) : [];
        const lastBand = trendBands.length ? trendBands[trendBands.length - 1] : null;
        const trendText = primary ? `<div class="trend-summary"><strong>${primary.ticker} trend:</strong> ${getTrendStateLabel(lastBand?.state || "neutral")}</div>` : "";
        if (!alerts.length) {
          confluenceAlertsEl.innerHTML = trendText;
          return;
        }
        confluenceAlertsEl.innerHTML = trendText + alerts
          .slice(0, 6)
          .map((a) => `<div class="alert-item">${a.text}</div>`)
          .join("");
      }

      function expectedBarMs(rangeKey) {
        const m = {
          "1d": 60 * 1000,
          "1w": 5 * 60 * 1000,
          "1m": 15 * 60 * 1000,
          "3m": 60 * 60 * 1000,
          "1y": 24 * 60 * 60 * 1000,
          "max": 24 * 60 * 60 * 1000,
        };
        return m[rangeKey] || 60 * 1000;
      }

      function breakSeriesOnGaps(points, rangeKey) {
        const src = Array.isArray(points) ? points : [];
        if (src.length <= 1) return src;
        const thresholdMs = expectedBarMs(rangeKey) * 8;
        const out = [src[0]];
        for (let i = 1; i < src.length; i += 1) {
          const prev = src[i - 1];
          const curr = src[i];
          const prevMs = Date.parse(String(prev?.x || ""));
          const currMs = Date.parse(String(curr?.x || ""));
          if (Number.isFinite(prevMs) && Number.isFinite(currMs) && (currMs - prevMs) > thresholdMs) {
            out.push({ x: new Date(prevMs + 1).toISOString(), y: null });
          }
          out.push(curr);
        }
        return out;
      }

      function buildGapConnectorSeries(points, rangeKey) {
        const src = Array.isArray(points) ? points : [];
        if (src.length <= 1) return [];
        const thresholdMs = expectedBarMs(rangeKey) * 8;
        const out = [];
        for (let i = 1; i < src.length; i += 1) {
          const prev = src[i - 1];
          const curr = src[i];
          const prevMs = Date.parse(String(prev?.x || ""));
          const currMs = Date.parse(String(curr?.x || ""));
          if (!Number.isFinite(prevMs) || !Number.isFinite(currMs)) continue;
          if ((currMs - prevMs) > thresholdMs) {
            out.push({ x: prev.x, y: prev.y });
            out.push({ x: curr.x, y: curr.y });
            out.push({ x: curr.x, y: null });
          }
        }
        return out;
      }

      async function fetchTickerData(symbol) {
        try {
          const res = await fetch(
            `/api/history?ticker=${encodeURIComponent(symbol)}&range=${encodeURIComponent(activeRange)}`
          );
          const payload = await res.json();
          if (!res.ok) {
            const detail = [payload.error || "Request failed.", payload.hint || "", payload.provider_used ? `provider=${payload.provider_used}` : ""]
              .filter(Boolean)
              .join(" | ");
            throw new Error(`${symbol}: ${detail}`);
          }
          return payload;
        } catch (err) {
          throw new Error(`${symbol}: ${err.message || "Request failed."}`);
        }
      }

                pointHitRadius: 0,

              });

          });

          if (showRsi) {
            const normalizedRsi = normalizeRsiSeries(buildRsiSeries(p.points, 14), series);
            if (normalizedRsi.length > 0) {
              datasets.push({
                label: `${p.ticker} RSI (norm)`,

              const span = (minY != null && maxY != null) ? Math.max(maxY - minY, 1e-9) : null;
              const firstX = normalizedRsi[0]?.x;
              const lastX = normalizedRsi[normalizedRsi.length - 1]?.x;
              if (span != null && firstX && lastX) {

                datasets.push({

      function updatePressureState(payloads) {
        pressureByTicker = {};
        overallPressure = null;

        if (!Array.isArray(payloads) || payloads.length === 0) {
          pressureOverallEl.innerHTML = '<div class="pressure-title">Estimated Buy/Sell Pressure</div><div class="meta">No data.</div>';
          renderTickerList();
          return;
        }

        let totalBuy = 0;
        let totalSell = 0;

        payloads.forEach((p) => {
          let buy = 0;
          let sell = 0;

          p.points.forEach((pt) => {
            const vol = Number(pt.volume || 0);
            if (pt.open == null || pt.close == null) return;
            if (pt.close >= pt.open) {
              buy += vol;
            } else {
              sell += vol;
            }
          });

          const total = buy + sell;
          const buyPct = total > 0 ? (buy / total) * 100 : 0;
          const sellPct = 100 - buyPct;

          pressureByTicker[p.ticker] = { buy, sell, buyPct, sellPct };
          totalBuy += buy;
          totalSell += sell;
        });

        const grandTotal = totalBuy + totalSell;
        const totalBuyPct = grandTotal > 0 ? (totalBuy / grandTotal) * 100 : 0;
        const totalSellPct = 100 - totalBuyPct;
        overallPressure = { totalBuy, totalSell, totalBuyPct, totalSellPct };

        pressureOverallEl.innerHTML = `
          <div class="pressure-title">Overall Buy/Sell Pressure (heuristic)</div>
          <div class="pressure-head">
            <span><strong>Overall</strong></span>
            <span>Buy ${totalBuyPct.toFixed(1)}% / Sell ${totalSellPct.toFixed(1)}%</span>
          </div>
          <div class="pressure-bar">
            <div class="pressure-buy" style="width:${totalBuyPct}%;"></div>
            <div class="pressure-sell" style="width:${totalSellPct}%;"></div>
          </div>
        `;

        renderTickerList();
      }

      async function loadData() {
        const loadSeq = ++latestLoadSeq;
        const selectedSymbols = getSelectedSymbols();
        const selected = selectedSymbols.map((symbol) => ({ symbol }));

        if (selected.length === 0) {
          if (priceChart) priceChart.destroy();
          latestPayloadByTicker = {};
          meta.textContent = "Select at least one ticker.";
          renderConfluenceAlerts([]);
          updatePressureState([]);
          renderHoldingsSummary();
          return;
        }

        errorEl.textContent = "";
        meta.textContent = `Loading ${selected.map((t) => t.symbol).join(", ")} (${activeRange})...`;

        const results = await Promise.allSettled(selected.map((t) => fetchTickerData(t.symbol)));
        // Ignore stale responses from older in-flight loads.
        if (loadSeq !== latestLoadSeq) {
          return;
        }

        const fulfilled = results.filter((r) => r.status === "fulfilled").map((r) => r.value);
        latestPayloadByTicker = {};
        fulfilled.forEach((p) => {
          if (p && p.ticker) latestPayloadByTicker[p.ticker] = p;
        });
        renderHoldingsSummary();
        const nonEmpty = fulfilled.filter((p) => Array.isArray(p.points) && p.points.length > 0);
        const emptyTickers = fulfilled.filter((p) => !Array.isArray(p.points) || p.points.length === 0).map((p) => p.ticker);
        const failures = results
          .filter((r) => r.status === "rejected")
          .map((r) => r.reason?.message || "Request failed.");

        if (nonEmpty.length === 0) {
          if (priceChart) priceChart.destroy();
          meta.textContent = "No data returned for selected tickers.";
          renderConfluenceAlerts([]);
          const skipped = [
            ...emptyTickers.map((t) => `${t}: no data for selected range`),
            ...failures,
          ];
          errorEl.textContent = skipped.join(" | ");
          updatePressureState([]);
          return;
        }

        drawChart(nonEmpty);
        renderConfluenceAlerts(nonEmpty);
        updatePressureState(nonEmpty);

        const summary = activeRange === "1d"
          ? nonEmpty.map((p) => buildOneDaySessionSummary(p)).filter(Boolean).join(" | ")
          : nonEmpty
              .map((p) => {
                const first = p.points[0].close;
                const last = p.points[p.points.length - 1].close;
                const chg = ((last - first) / first) * 100;
                const sign = chg >= 0 ? "+" : "";
                return `${p.ticker}: ${sign}${chg.toFixed(2)}%`;
              })
              .join(" | ");

        meta.textContent = `range: ${activeRange} | scale: ${resolvedScaleMode} | source: twelve_data | loaded ${nonEmpty.length}/${selected.length} | ${summary}`;
        const skipped = [
          ...emptyTickers.map((t) => `${t}: no data for selected range`),
          ...failures,
        ];
        errorEl.textContent = skipped.length ? `Skipped: ${skipped.join(" | ")}` : "";
      }

      function addTicker() {
        const symbol = sanitizeTicker(tickerInput.value);
        if (!symbol) {
          errorEl.textContent = "Enter a valid ticker.";
          return;
        }

        if (tickers.some((t) => t.symbol === symbol) || getAllImportedTickers().some((t) => t.symbol === symbol)) {
          errorEl.textContent = `${symbol} is already in your lists.`;
          return;
        }

        const selectedNow = getTotalSelectedCount();
        tickers.unshift({ symbol, selected: selectedNow < MAX_SELECTED });
        logAction("saved_ticker_added", { symbol, auto_selected: selectedNow < MAX_SELECTED });

        if (selectedNow >= MAX_SELECTED) {
          errorEl.textContent = `Added ${symbol}. Select it by unchecking another ticker first.`;
        } else {
          errorEl.textContent = "";
        }

        tickerInput.value = "";
        saveTickers();
        syncDefaultCategoryFromTickers();
        renderLeftTabs();
        renderTickerList();
        loadData();
      }

      addBtn.addEventListener("click", addTicker);
      tickerInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter") addTicker();
      });

      rangeButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          setActiveRange(btn.dataset.range);
          loadData();
        });
      });

      if (centerMenuBtn) {
        centerMenuBtn.addEventListener("click", (ev) => {
          ev.stopPropagation();
          openRowActionsMenu(ev.clientX, ev.clientY, [
            {
              label: "ClearAll",
              onClick: () => clearAllSelections(),
            },
          ]);
        });
      }

      if (fullscreenBtn) {
        fullscreenBtn.addEventListener("click", () => {
          toggleFullscreenMainPanel();
        });
      }
      if (zoomInBtn) {
        zoomInBtn.addEventListener("click", () => zoomChartX(1.2));
      }
      if (resetZoomBtn) {
        resetZoomBtn.addEventListener("click", () => resetChartZoom());
      }
      if (zoomOutBtn) {
        zoomOutBtn.addEventListener("click", () => zoomChartX(0.8));
      }

      if (typeof ResizeObserver !== "undefined" && chartWrapEl) {
        chartWrapResizeObserver = new ResizeObserver(() => {
          if (!priceChart) return;
          if (chartWrapResizeTimer) clearTimeout(chartWrapResizeTimer);
          chartWrapResizeTimer = setTimeout(() => {
            try {
              priceChart.resize();
              priceChart.update("none");
            } catch (_) {
              // no-op
            }
          }, 40);
        });
        chartWrapResizeObserver.observe(chartWrapEl);
      }

      document.addEventListener("fullscreenchange", () => {
        updateFullscreenUi();
        refreshChartAfterFullscreenChange();
        if (!isFullscreenActive()) {
          setTimeout(() => window.dispatchEvent(new Event("resize")), 30);
          setTimeout(() => window.dispatchEvent(new Event("resize")), 140);
        }
        debugLayoutState("fullscreenchange_event");
      });
      document.addEventListener("webkitfullscreenchange", () => {
        updateFullscreenUi();
        refreshChartAfterFullscreenChange();
        if (!isFullscreenActive()) {
          setTimeout(() => window.dispatchEvent(new Event("resize")), 30);
          setTimeout(() => window.dispatchEvent(new Event("resize")), 140);
        }
        debugLayoutState("webkitfullscreenchange_event");
      });
      window.__yfDebugLayout = (label = "manual_dump") => debugLayoutState(label);

      scaleButtons.forEach((btn) => {
        btn.addEventListener("click", () => {
          setScaleMode(btn.dataset.scale);
          loadData();
        });
      });

      maToggleEls.forEach((el) => {
        el.addEventListener("change", () => {
          const key = String(el.dataset.ma || "").trim();
          if (!key || !(key in maVisibility)) return;
          maVisibility[key] = !!el.checked;
          const selectedSymbols = getSelectedSymbols();
          const payloads = selectedSymbols
            .map((symbol) => latestPayloadByTicker[symbol])
            .filter((p) => Array.isArray(p?.points) && p.points.length > 0);
          if (!payloads.length) return;
          drawChart(payloads);
          logAction("ma_toggle", { key, enabled: !!el.checked });
        });
      });

      if (rsiToggleEl) {
        rsiToggleEl.addEventListener("change", () => {
          showRsi = !!rsiToggleEl.checked;
          if (rsiWrapEl) rsiWrapEl.style.display = "none";
          const selectedSymbols = getSelectedSymbols();
          const payloads = selectedSymbols
            .map((symbol) => latestPayloadByTicker[symbol])
            .filter((p) => Array.isArray(p?.points) && p.points.length > 0);
          if (!payloads.length) return;
          drawChart(payloads);
          logAction("rsi_toggle", { enabled: showRsi });
        });
      }

      if (macdToggleEl) {
        macdToggleEl.addEventListener("change", () => {
          showMacd = !!macdToggleEl.checked;
          const selectedSymbols = getSelectedSymbols();
          const payloads = selectedSymbols
            .map((symbol) => latestPayloadByTicker[symbol])
            .filter((p) => Array.isArray(p?.points) && p.points.length > 0);
          if (!payloads.length) return;
          drawChart(payloads);
          logAction("macd_toggle", { enabled: showMacd });
        });
      }

      if (csvFileInput) {
        csvFileInput.addEventListener("change", () => importCsvFile());
      }

      async function initApp() {
        logAction("app_init_start", {});
        loadTickers();
        await loadImportedPortfolios();
        await loadLeftCategories();
        syncDefaultCategoryFromTickers();
        enforceMaxSelections();
        saveTickers();
        setScaleMode("auto");
        updatePressureState([]);
        renderLeftTabs();
        renderTickerList();
        renderImportedPortfolios();
        updateSelectedCount();
        await loadData();
        logAction("app_init_done", {
          saved_tickers: tickers.length,
          imported_portfolios: importedPortfolios.length,
          selected_count: getTotalSelectedCount(),
        });
      }

      document.addEventListener('click', (e) => {
        if (holdingContextMenu && !holdingContextMenu.contains(e.target)) {
          closeHoldingContextMenu();
        }
        if (panelActionsMenu && !panelActionsMenu.contains(e.target)) {
          closePanelActionsMenu();
        }
        if (rowActionsMenu && !rowActionsMenu.contains(e.target)) {
          closeRowActionsMenu();
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          closeHoldingContextMenu();
          closePanelActionsMenu();
        }
      });

      window.addEventListener("error", (e) => {
        logAction("frontend_error", {
          message: e.message || "unknown",
          source: e.filename || "",
          line: e.lineno || 0,
          column: e.colno || 0,
        });
      });

      window.addEventListener("unhandledrejection", (e) => {
        const reason = e.reason && e.reason.message ? e.reason.message : String(e.reason || "unknown");
        logAction("frontend_unhandled_rejection", { reason });
      });

      initApp();
    </script>
  </body>
</html>
